[env:tenstar-esp32-s3-tft]
extends = env
board = esp32-s3-devkitc-1
board_build.partitions = custom_4Mb_full.csv
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.f_flash = 80000000
build_src_filter = ${env.build_src_filter} +<../boards/tenstar-esp32-s3-tft>
build_flags =
    ${env.build_flags}
    -Iboards/tenstar-esp32-s3-tft

    -DDEVICE_NAME='"TENSTAR ESP32-S3 TFT"'
    -DNEW_DEVICE=1
    -Isrc

    ; ── Screen ───────────────────────────────────────────
    -DHAS_SCREEN=1
    -DROTATION=1
    -DWIDTH=240
    -DHEIGHT=135
    -DMINBRIGHT=10
    -DFP=1
    -DFM=2
    -DFG=3

    ; ── TFT (ST7789, SPI) ────────────────────────────────
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_RGB_ORDER=TFT_RGB
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DUSE_HSPI_PORT
    -DTFT_BACKLIGHT_ON=1
    -DTFT_MISO=37
    -DTFT_MOSI=35
    -DTFT_SCLK=36
    -DTFT_CS=7
    -DTFT_DC=39
    -DTFT_RST=40
    -DTFT_BL=45
    -DTOUCH_CS=-1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DBOARD_HAS_PSRAM

    ; ── Buttons ──────────────────────────────────────────
    -DHAS_3_BUTTONS=1
    -DUP_BTN=8
    -DSEL_BTN=14
    -DDW_BTN=15
    -DBTN_ACT=LOW
    -DBTN_ALIAS='"SEL"'

    ; ── RGB LED (FastLED, WS2812, GPIO33) ────────────────────
    -DHAS_RGB_LED=1
    -DRGB_LED=33
    -DLED_TYPE=WS2812
    -DLED_ORDER=GRB
    -DLED_COUNT=1
    -DLED_COLOR_STEP=15

    ; ── LED ──────────────────────────────────────────────
    -DLED=13
    -DLED_ON=HIGH
    -DLED_OFF=LOW

    ; ── I2C ──────────────────────────────────────────────
    -DGROVE_SDA=42
    -DGROVE_SCL=41

    ; ── SD Card (external SPI module) ────────────────────
    -DSDCARD_CS=10
    -DSDCARD_MOSI=11
    -DSDCARD_MISO=12
    -DSDCARD_SCK=13

    ; ── SPI bus (for CC1101/NRF24 if attached later) ─────
    -DSPI_SCK_PIN=13
    -DSPI_MOSI_PIN=11
    -DSPI_MISO_PIN=12
    -DSPI_SS_PIN=10

    ; ── IR (external module, free GPIOs) ─────────────────
    -DIR_TX_PINS='{{"GPIO16", 16}, {"GPIO17", 17}}'
    -DIR_RX_PINS='{{"GPIO16", 16}, {"GPIO17", 17}}'

    ; ── RF (external module, free GPIOs) ─────────────────
    -DRF_TX_PINS='{{"GPIO5", 5}, {"GPIO5", 5}}'
    -DRF_RX_PINS='{{"GPIO6", 6}, {"GPIO6", 6}}'

    ; ── Battery ──────────────────────────────────────────
    -DBAT_PIN=-1

    ; ── USB HID (ESP32-S3 native USB) ────────────────────
    -DUSB_as_HID=1

lib_deps = ${env.lib_deps}
